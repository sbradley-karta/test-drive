<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anaplan Mockup Generator</title>
    <link rel="stylesheet" href="styles.css?v=20260501" />
  </head>
  <body>
    <div class="app-shell">
      <section class="mockup-frame">
        <section class="ux-shell-frame" aria-label="single Anaplan UX page frame">
          <header class="top-nav anaplan-shell-row sketch-border" aria-label="fixed Anaplan application shell">
            <div class="anaplan-brand" aria-label="Anaplan shell">
              <span class="anaplan-logo-mark">A</span>
              <span class="apps-label">Apps</span>
              <span class="shell-caret" aria-hidden="true">▾</span>
            </div>

            <div class="shell-selector shell-app-selector">
              <span class="shell-editable" contenteditable="true">[App Name]</span>
              <span class="shell-caret" aria-hidden="true">▾</span>
            </div>

            <div class="shell-selector shell-page-selector">
              <button id="shell-page-menu-button" class="shell-page-menu-button" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="shell-page-menu">
                <span class="shell-editable">[Category Name] / [Page Name]</span>
                <span class="shell-caret" aria-hidden="true">▾</span>
              </button>
              <div id="shell-page-menu" class="shell-page-menu" role="menu" hidden></div>
            </div>

            <div class="workspace-selector">
              <span contenteditable="true">[Workspace Name]</span>
              <span class="shell-caret" aria-hidden="true">▾</span>
            </div>

            <div class="utility-icons" aria-label="Utility icons">
              <span class="utility-icon network-icon" aria-label="model map"></span>
              <span class="utility-icon search-icon" aria-label="search"></span>
              <span class="utility-icon bell-icon" aria-label="notifications"></span>
              <span class="utility-icon help-icon" aria-label="help">?</span>
            </div>

            <div class="user-badge" aria-label="User initials">KA</div>
          </header>

          <section class="page-body">
            <section class="main-page-area">
              <section class="context-bar sketch-border">
                <div class="page-title-group">
                  <span class="back-chevron" aria-hidden="true">‹</span>
                  <span class="left-context" contenteditable="true">[Page Name]</span>
                  <span class="page-action" aria-hidden="true">↻</span>
                  <span class="page-action" aria-hidden="true">⌯</span>
                  <span class="page-action" aria-hidden="true">☆</span>
                </div>
                <div id="context-filter-row" class="filters-row" aria-label="context filters row"></div>
                <button id="add-header-filter" class="header-filter-add" type="button" aria-label="Add context filter" title="Add context filter">+</button>
                <div class="page-toolbar-icons" aria-label="page toolbar icons">
                  <span class="page-tool sparkle-icon">✦</span>
                  <span class="page-tool comment-icon">□</span>
                  <span class="page-tool more-icon">...</span>
                </div>
                <button id="toggle-insights" class="toggle-btn shelf-toggle" type="button" aria-pressed="true" aria-label="Collapse Additional Insights" title="Collapse Additional Insights">
                  <span class="shelf-toggle-icon" aria-hidden="true"></span>
                </button>
              </section>

              <section class="ux-page sketch-border">
                <section id="canvas" class="canvas" aria-label="main ux mockup area"></section>
              </section>
            </section>

            <aside id="insights" class="insights">
              <h3 contenteditable="true">Additional Insights</h3>
              <section id="insights-canvas" class="insights-canvas" aria-label="additional insights area"></section>
            </aside>
          </section>
        </section>

        <footer class="disclaimer">Concept sketch for alignment only - not final UI design.</footer>
      </section>

      <aside id="builder-pane" class="builder-pane">
        <button id="builder-toggle" class="builder-toggle" type="button" aria-expanded="true" aria-controls="builder-card">
          Hide Controls
        </button>

        <div id="builder-card" class="builder-card">
          <header class="builder-brand">
            <div class="karta-mark">
              <img src="Karta%20-%20Logo%20IconArtboard%205%404x.png" alt="Karta Consulting Group" />
            </div>
            <div>
              <h3>Mockup Builder Controls</h3>
              <p>v0.1.8 local project workspace</p>
            </div>
          </header>

          <section class="builder-section project-section" aria-label="Page management">
            <h4>Pages</h4>
            <div class="page-actions">
              <button id="save-page" type="button">Save Page</button>
              <button id="new-page" type="button">New Page</button>
              <button id="duplicate-page" type="button">Duplicate</button>
              <button id="rename-page" type="button">Rename</button>
              <button id="delete-page" class="danger" type="button">Delete</button>
            </div>
          </section>

          <section class="builder-section card-section" aria-label="Card controls">
            <h4>Cards</h4>
            <label class="target-label" for="target-area">Add card to</label>
            <select id="target-area" class="visually-hidden" aria-hidden="true" tabindex="-1">
              <option value="canvas">Main Canvas</option>
              <option value="insights">Additional Insights</option>
            </select>
            <div class="target-segmented" role="radiogroup" aria-label="Add card to">
              <label>
                <input type="radio" name="target-area-choice" value="canvas" checked />
                <span>Main Canvas</span>
              </label>
              <label>
                <input type="radio" name="target-area-choice" value="insights" />
                <span>Insights</span>
              </label>
            </div>

            <div class="controls">
              <button data-widget="kpi" type="button">+ KPI</button>
              <button data-widget="grid" type="button">+ Grid</button>
              <button data-widget="chart" type="button">+ Chart</button>
              <button data-widget="button" type="button">+ Button</button>
              <button data-widget="text" type="button">+ Title/Header</button>
              <button data-widget="checkbox" type="button">+ Checkbox</button>
              <button data-widget="field" type="button">+ Field</button>
              <button data-widget="textbox" type="button">+ Text Box</button>
              <button data-widget="logo" type="button">+ Logo</button>
            </div>

            <button id="clear-canvas" class="secondary" type="button">Clear All Cards</button>
          </section>

          <section class="builder-section output-section" aria-label="Export controls">
            <h4>Outputs</h4>
            <button id="export-pdf" type="button">Export UX Mockup PDF</button>
            <button id="export-project" type="button">Export Project JSON</button>
            <button id="import-project" type="button">Import Project JSON</button>
            <input id="import-project-file" type="file" accept="application/json,.json" hidden />
          </section>
        </div>
      </aside>
    </div>

    <template id="widget-template">
      <article class="widget sketch-border" draggable="false">
        <div class="drag-handle" title="Drag card" aria-label="Drag card">⋮⋮</div>
        <div class="widget-header" contenteditable="true">Card Title</div>
        <div class="widget-content"></div>
        <div class="widget-filter-list" aria-label="Card filters"></div>
        <button class="add-widget-filter" type="button" title="Add card filter">+ Filter</button>
        <button class="details" title="Card details" type="button" aria-label="Card details">ⓘ</button>
        <button class="remove" title="Remove" type="button">×</button>
        <div class="resize-handle" aria-hidden="true"></div>
      </article>
    </template>

    <template id="header-filter-template">
      <div class="header-filter">
        <span class="filter-label" contenteditable="true">Filter</span>
        <span class="filter-value" contenteditable="true">Value</span>
        <button class="remove-filter" type="button" aria-label="Remove filter">×</button>
      </div>
    </template>

    <dialog id="widget-details-modal" class="widget-details-modal">
      <form method="dialog" class="widget-details-form">
        <header>
          <h3>Card Build Details</h3>
          <button id="close-details-modal" type="button" aria-label="Close card details">×</button>
        </header>

        <label for="detail-purpose">Card purpose</label>
        <textarea id="detail-purpose" rows="2"></textarea>

        <label for="detail-source">Source module or data source</label>
        <input id="detail-source" type="text" />

        <label for="detail-grain">Grain / dimensionality</label>
        <input id="detail-grain" type="text" />

        <label for="detail-editability">Editable vs read-only intent</label>
        <select id="detail-editability">
          <option value="">Not specified</option>
          <option value="Editable">Editable</option>
          <option value="Read-only">Read-only</option>
          <option value="Mixed">Mixed editable/read-only</option>
        </select>

        <label for="detail-assumptions">Build assumptions</label>
        <textarea id="detail-assumptions" rows="3"></textarea>

        <label for="detail-open-questions">Open questions</label>
        <textarea id="detail-open-questions" rows="3"></textarea>

        <label for="detail-notes">Notes / comments</label>
        <textarea id="detail-notes" rows="4"></textarea>

        <div class="modal-actions">
          <button id="cancel-details" class="secondary" type="button">Cancel</button>
          <button id="save-details" type="submit">Save Details</button>
        </div>
      </form>
    </dialog>

    <dialog id="rename-page-modal" class="widget-details-modal rename-page-modal">
      <form method="dialog" class="widget-details-form">
        <header>
          <h3>Rename Page</h3>
          <button id="close-rename-page-modal" type="button" aria-label="Close rename page">×</button>
        </header>

        <label for="rename-page-input">Page name</label>
        <input id="rename-page-input" type="text" />

        <div class="modal-actions">
          <button id="cancel-rename-page" class="secondary" type="button">Cancel</button>
          <button id="save-rename-page" type="submit">Save Name</button>
        </div>
      </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="app.js?v=20260501"></script>
  </body>
</html>
